<script>
    fetch("/dashboard/buscarArtigos")
    .then(res => res.json())
    .then(artigos => {

        for(let i = 0; i < artigos.length; i++){

            if (artigos[i].categoria == 'Artigo de Opinião'){
                listaArtigosOpinioes.innerHTML += `<div class="cardArtigo" onclick="abrirArtigo(${artigos[i].idArtigo})">
                                                        <h2 class="tituloArtigos">${artigos[i].titulo}</h2>
                                                        <p>${artigos[i].categoria}</p>
                                                    </div>`;
            } else {
                listaArtigosResenhas.innerHTML += `<div class="cardArtigo" onclick="abrirArtigo(${artigos[i].idArtigo})">
                                                        <h2 class="tituloArtigos">${artigos[i].titulo}</h2>
                                                        <p>${artigos[i].categoria}</p>
                                                    </div>`;
            }                                                     
        }

    });



    function abrirArtigo(idArtigo){

        sessionStorage.ID_ARTIGO = idArtigo;

        window.location.href = "artigo.html";
    }

</script>
