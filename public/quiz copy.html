<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
    .pergunta{
        display: none;
    }
</style>

</head>
<body>

    <div id="pergunta1" class="pergunta">
        <p>Qual dessas apresentações parece mais interessante?</p>

        <input type="radio" id="opt1_per1" name="pergunta1" value="experimental">
        <label for="opt1_per1">Uma peça diferente e fora do padrão</label><br>

        <input type="radio" id="opt2_per1" name="pergunta1" value="comico">
        <label for="opt2_per1">Uma apresentação divertida e interativa</label><br>

        <input type="radio" id="opt3_per1" name="pergunta1" value="musical">
        <label for="opt3_per1">Um grande musical cheio de música e dança</label><br>

        <input type="radio" id="opt4_per1" name="pergunta1" value="classico">
        <label for="opt4_per1">Uma peça clássica em um teatro histórico</label><br>

        <input type="radio" id="opt5_per1" name="pergunta1" value="contemporaneo">
        <label for="opt5_per1">Uma peça moderna sobre temas atuais</label><br>

        <button onclick="proximaPergunta()">
            Próxima
        </button>
    </div>



    <div id="pergunta2" class="pergunta">
        <p>O que mais chama sua atenção em uma peça?</p>

        <input type="radio" id="opt1_per2" name="pergunta2" value="comico">
        <label for="opt1_per2">Humor e diversão</label><br>

        <input type="radio" id="opt2_per2" name="pergunta2" value="classico">
        <label for="opt2_per2">Conversas e histórias bem construídas</label><br>

        <input type="radio" id="opt3_per2" name="pergunta2" value="contemporaneo">
        <label for="opt3_per2">Temas atuais e reflexivos</label><br>

        <input type="radio" id="opt4_per2" name="pergunta2" value="experimental">
        <label for="opt4_per2">Coisas diferentes e inesperadas</label><br>

        <input type="radio" id="opt5_per2" name="pergunta2" value="musical">
        <label for="opt5_per2">Emoção forte e cenas grandiosas</label><br>

        <button onclick="proximaPergunta()">
            Próxima
        </button>
    </div>

    <div id="pergunta9" class="pergunta">
        <p>Se você pudesse entrar em um palco agora, qual escolheria?</p>

        <!-- suas alternativas -->

        <button onclick="cadastrarResultado()">
            Ver Resultado
        </button>
    </div>

</body>
</html>

<script>

let perguntaAtual = 1;

window.onload = function(){
    document.getElementById("pergunta1").style.display = "block";
}

function proximaPergunta(){

    document.getElementById(`pergunta${perguntaAtual}`).style.display = "none";

    perguntaAtual++;

    document.getElementById(`pergunta${perguntaAtual}`).style.display = "block";
}

</script>
