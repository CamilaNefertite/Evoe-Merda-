  <body>


<body>

    <div class="dashboard">
          <aside class="sidebar">

        <main class="conteudo">
          <!--
          <section class="saudacoes">

          </section> 
          -->

            <section class="kpis">
                <div class="card">
                    <h3>Total de usuários</h3>
                    <p id="kpiTotalUsuarios"></p>
                </div>
                <div class="card">
                    <h3>Linguagem teatral dominante</h3>
                    <p id="kpiLingTeatralDominante"></p>

                <div class="card">

                    <p id="kpiBuscarTipoPerfilDominante"></p>

                <div class="card">

            <section class="graficos">
                <div class="grafico">

                    <h3>Resultados do Quiz</h3>
                    <canvas id="graficoQuiz"></canvas>

            </section>

            <section class="grafico-grande">

</html>

    // PRA KPIS
    // PRA KPIS
    // PRA KPIS
    // PRA KPIS
    // PRA KPIS

    buscarUsuarios();
    function buscarUsuarios() {
        fetch("/dashboard/buscarUsuarios")
        .then(function(resposta) {
            return resposta.json();
        })
        .then(function(dados) {
            //console.log(dados);
            document.getElementById("kpiTotalUsuarios").innerHTML = dados[0].total;
        })
    }


    buscarLingTeatralDominante();
    function buscarLingTeatralDominante() {
        fetch("/dashboard/buscarLingTeatralDominante")
        .then(function(resposta) {
            return resposta.json();
        })
        .then(function(dados) {
            //console.log(dados);
            document.getElementById("kpiLingTeatralDominante").innerHTML = dados[0].resultado;
        })
    }


    buscarTipoPerfilDominante();
    function buscarTipoPerfilDominante() {
        fetch("/dashboard/buscarTipoPerfilDominante")
        .then(function(resposta) {
            return resposta.json();
        })
        .then(function(dados) {
            //console.log(dados);
            document.getElementById("kpiBuscarTipoPerfilDominante").innerHTML = dados[0].perfilPredominante;
        })
    }


    buscarQtdQuizzesFeitos();
    function buscarQtdQuizzesFeitos() {
        fetch("/dashboard/buscarQtdQuizzesFeitos")
        .then(function(resposta) {
            return resposta.json();
        })
        .then(function(dados) {
            //console.log(dados);
            document.getElementById("kpiTotalQuizzes").innerHTML = dados[0].qtdQuizzesFeitos;
        })
    }

    // PRA GRAFICOS
    // PRA GRAFICOS
    // PRA GRAFICOS
    // PRA GRAFICOS
    // PRA GRAFICOS    

    buscarResultadosQuiz();
    function buscarResultadosQuiz() {
        fetch("/dashboard/buscarResultadosQuiz")
        .then(function(resposta) {
            return resposta.json();
        })
        .then(function(dados) {
            //console.log(dados);
            plotarGrafico(dados);
        })
    }

    function plotarGrafico(dados) {
        let labels = [];
        let valores = [];

        for(let i = 0; i < dados.length; i++) {
            labels.push(dados[i].resultado);
            valores.push(dados[i].total);
        }
        new Chart(document.getElementById("graficoQuiz"), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Resultados do Quiz',
                    data: valores,
                    borderWidth: 1
                }]
            }
        });
    }


    </script>
  </body>
